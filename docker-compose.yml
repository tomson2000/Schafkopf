services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      VITE_SERVER_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - server
